<!DOCTYPE html>
<html>
<head>
  <script>
    (function() {
      var base = '/chat-scroll-challenge/';
      if (window.location.pathname.indexOf(base) !== -1 && window.location.pathname[window.location.pathname.length - 1] !== '/' ) {
        window.location.replace(window.location.href + '/');
      }
    })();
  </script>
  <base href="/chat-scroll-challenge/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A Flutter chat app demonstrating advanced auto-scroll behavior with Gemini AI.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Chat Scroll">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Chat Scroll Challenge</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
